<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>
</head>
<body>
    <h2>Crop Yield Prediction</h2>
    <form action="/predict" method="post">
        Crop: <input type="text" name="Crop" required><br>
        Season: <input type="text" name="Season" required><br>
        State: <input type="text" name="State" required><br>
        Area (hectares): <input type="number" name="Area" step="any" required><br>
        Annual Rainfall (mm): <input type="number" name="Annual_Rainfall" step="any" required><br>
        Fertilizer Used (kg): <input type="number" name="Fertilizer" step="any" required><br>
        Pesticide Used (kg): <input type="number" name="Pesticide" step="any" required><br>
        Model:
        <select name="model">
            <option value="random_forest">Random Forest</option>
            <option value="gradient_boosting">Gradient Boosting</option>
        </select><br>
        <button type="submit">Predict</button>
    </form>
    
    {% if prediction %}
        <h3>{{ prediction }}</h3>
    {% endif %}
</body>
</html>
